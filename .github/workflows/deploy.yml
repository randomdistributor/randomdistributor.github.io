name: Deploy admin to GitHub Pages

# Builds the Flutter Web admin console and publishes it to GitHub Pages
# on every push to main. Served at the org root: https://randomdistributor.github.io/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build web
        working-directory: admin
        run: |
          flutter pub get
          flutter build web --release --base-href /

      - uses: actions/upload-pages-artifact@v3
        with:
          path: admin/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
